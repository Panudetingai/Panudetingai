name: Generate Pacman Contribution Graph

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: lowlighter/metrics@latest
        with:
          filename: pacman-output/puzzle-bobble-contribution-graph.svg
          token: ${{ secrets.GITHUB_TOKEN }}

          plugin_isocalendar: yes
